services:
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
    volumes:
      - falkordb_data:/data

  codeatlas:
    build: .
    ports:
      - "8000:8000"
    environment:
      CODEATLAS_AUTH_ENABLED: "false"
      CODEATLAS_EMBEDDING_PROVIDER: "sentence"
      CODEATLAS_LLM_PROVIDER: "openai"
      GRAPH_DB_URL: falkordb
      GRAPH_DB_PORT: "6379"
      ENABLE_BACKEND_ACCESS_CONTROL: "false"
    volumes:
      - ./.codeatlas:/app/.codeatlas
    depends_on:
      - falkordb

volumes:
  falkordb_data:
